<!DOCTYPE html>
<html>
<head>
    <title>RESULT @ ePortal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    JAMMU AND KASHMIR BOARD OF TECHNICAL EDUCATION
</div>

<div class="login-box">
    <h2>RESULT @ ePortal-JKBOTE</h2>

    <input type="text" id="roll" placeholder="Enter Roll Number">
    <input type="text" id="reg" placeholder="Enter Registration Number">
    <button onclick="goToResult()">View Result</button>

    <p id="error"></p>
</div>

<script>
function goToResult(){
    var roll = document.getElementById("roll").value.trim();
    var reg = document.getElementById("reg").value.trim();

    if(roll === "1104-25N3-48232" && reg === "11-04-R24-1316"){
        window.location.href = "result.html";
    } else {
        document.getElementById("error").innerHTML =
        "Invalid Roll Number or Registration Number";
    }
}
</script>
